; ===========================================================================
;  Driver Drowsiness Detection System — Arduino + ESP-01 (AT) Firmware
;  PlatformIO project configuration
; ===========================================================================
;
;  Architecture:
;    Arduino Uno  —  main controller (sensor + alert logic)
;    ESP-01       —  Wi-Fi co-processor, controlled via AT commands over
;                    hardware Serial (pins 0/1)
;
;  MPU6050 library used: jrowberg/I2Cdevlib-MPU6050
;  See the "LIBRARY NOTE" section at the bottom of this file.
; ===========================================================================

[platformio]
default_envs = uno

[env]
platform  = atmelavr
framework = arduino
upload_port  = COM3
monitor_port = COM3
monitor_speed = 115200

; ── Dependencies ────────────────────────────────────────────────────────────
; i2cdevlib MPU6050 driver (Jeff Rowberg)
; Pulls in the required I2Cdev base layer automatically.
lib_deps =
    jrowberg/I2Cdevlib-MPU6050 @ ^1.0.0

; ── Build flags ─────────────────────────────────────────────────────────────
; I2Cdev needs this define to use Arduino Wire instead of a custom I2C layer.
build_flags =
    -D I2CDEV_IMPLEMENTATION=I2CDEV_ARDUINO_WIRE

[env:uno]
board        = uno
upload_speed = 115200
build_src_filter =
    +<main.cpp>
    -<buzzer_test.cpp>
    -<vibration_test.cpp>

[env:uno_115200]
board        = nanoatmega328
upload_speed = 115200
build_src_filter =
    +<main.cpp>
    -<buzzer_test.cpp>
    -<vibration_test.cpp>

[env:uno_optiboot]
board        = uno
upload_speed = 115200
build_src_filter =
    +<main.cpp>
    -<buzzer_test.cpp>
    -<vibration_test.cpp>

[env:buzzer_test]
board        = uno
upload_speed = 115200
build_src_filter =
    +<buzzer_test.cpp>
    -<main.cpp>
    -<vibration_test.cpp>

[env:vibration_test]
board        = uno
upload_speed = 115200
build_src_filter =
    +<vibration_test.cpp>
    -<main.cpp>
    -<buzzer_test.cpp>

; ===========================================================================
;  LIBRARY NOTE
;  ============
;  The firmware uses the Jeff Rowberg / I2Cdevlib MPU6050 driver.
;  PlatformIO will download it automatically on first build.
;
;  If you prefer to install it manually in the PlatformIO Library Manager,
;  search for:   I2Cdevlib-MPU6050   (publisher: jrowberg)
;
;  No additional libraries are needed.  SoftwareSerial is bundled with the
;  Arduino AVR core.
; ===========================================================================
