; PlatformIO Project Configuration File
; Driver Drowsiness Detection System - ESP8266 Firmware

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

; Required libraries
lib_deps = 
    Wire
    ESP8266WiFi
    ESP8266HTTPClient
    bblanchon/ArduinoJson@^6.21.3
    electroniccats/mpu6050@^1.0.0

; Build flags
build_flags = 
    -DMQTT_MAX_PACKET_SIZE=512

; Upload settings
upload_speed = 921600
